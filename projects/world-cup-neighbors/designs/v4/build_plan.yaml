schema_version: 1
cad_backend: build123d
source_layout:
  assembly_entrypoint: source/v4/model.py
  authored_not_generated: true
  generated_outputs_prefix: outputs/world-cup-neighbors-v4
review_tools:
  agent:
    - FreeCAD
    - Blender
  manual:
    - Shapr3D
    - Bambu Studio
components:
  base:
    type: rounded_rectangle_slab
    size_mm: {x: 125, y: 70, z: 10}
    includes:
      - raised DAN star CARRIE lettering via build123d Text on front face
      - filleted top edge
  goal:
    type: structural_backdrop
    placement: rear, framing both figures, never covering faces
    constraints: {post_mm: 5.0, net_bar_mm: 2.2, net_opening_mm: 9}
  soccer_ball:
    type: fused_ball
    placement: front_left_fused_to_base_and_dans_foot
    diameter_mm: 19
    detail: engraved shallow panel lines only
  figures:
    type: toy_caricature_pair
    spec: people.yaml
    construction: each figure fused in its own BuildPart, then fused into scene
generation_sequence:
  - validate design-check gate for v4
  - author source/v4/model.py against these specs
  - export STEP and STL as one fused solid
  - run FreeCAD geometry review until valid, closed, zero warnings
  - render Blender required views
  - human approves renders (and optionally STEP in Shapr3D)
  - slice with Bambu Studio CLI to .gcode.3mf
  - human opens sliced project, reviews, and prints manually
next_agent_actions:
  - record the v4.1 physical result with bambu record-print-result
  - capture photos under photos/v4-post-print/ and write reviews/009 feedback
  - inspect the known tolerated nubs (cheek rims, glasses-ring bottoms, crossbar bridges)
  - fold lessons into docs/learning/ and propose v4.2 deltas against the designs/v4/*.yaml baselines
  - keep printer contact manual; every new revision re-runs bambu release-check
