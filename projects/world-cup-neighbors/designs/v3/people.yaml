schema_version: 1
people:
  - id: dan
    name: Dan
    role: left_figurine
    target_height_mm: 56
    head:
      width_mm: 24
      height_mm: 23
      height_ratio_min: 0.38
      form: rounded_oval_with_chin_and_cheeks
    silhouette:
      relative_height: taller
      torso: rounded_slim_jersey_capsule
      pose: one_arm_raised_or_bent_fan_gesture
    likeness_cues:
      - square raised glasses ridge
      - swept solid hair cap
      - taller stance
      - jersey number 10
    print_safe_face:
      glasses: fused_raised_ridge
      brows: raised_broad_bars
      nose: raised_vertical_ridge
      smile: engraved_broad_line
      cheeks: raised_small_mass
    clothing:
      jersey_panel: raised_paint_guide
      number: "10"
      accent_strategy: geometry_relief_only_no_paint_required
  - id: carrie
    name: Carrie
    role: right_figurine
    target_height_mm: 52
    head:
      width_mm: 24
      height_mm: 22
      height_ratio_min: 0.40
      form: rounder_oval_with_bob_hair_and_cheeks
    silhouette:
      relative_height: shorter
      torso: rounder_jersey_shape
      pose: fan_gesture_or_holding_fused_prop
    likeness_cues:
      - rounded raised glasses ridge
      - side-part solid hair mass
      - rounder silhouette
      - heart or jersey panel
    print_safe_face:
      glasses: fused_raised_ridge
      brows: raised_broad_bars
      nose: raised_vertical_ridge
      smile: engraved_broad_line
      cheeks: raised_small_mass
    clothing:
      jersey_panel: raised_paint_guide
      chest_mark: heart
      accent_strategy: geometry_relief_only_no_paint_required
shared_rules:
  face_style: rounded toy caricature heads with low-relief landmarks
  no_photorealism: true
  minimum_face_feature_width_mm: 1.2
  monochrome_readability_required: true
  face_must_read_at_thumbnail: true
  forbid:
    - separate eyeglass frames
    - thin fingers
    - hair strands
    - loose hand props
