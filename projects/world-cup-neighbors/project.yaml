schema_version: 1
slug: world-cup-neighbors
intent: Stylized Brazil watch-party neighbor figurines for the Bambu Lab A1 mini.
privacy: public_safe
lane: build123d
status: design
current_revision: v002
next_safe_action: run bambu design-check projects/world-cup-neighbors --revision v3 before generating v3 CAD
design_revisions:
  v3:
    status: spec_ready
    source_of_truth: designs/v3/*.yaml
    next_agent_action: generate build123d components from structured specs
printer:
  model: Bambu Lab A1 mini
  build_volume_mm:
  - 180
  - 180
  - 180
  nozzle_mm: 0.4
  max_hotend_c: 300
  printer_contact_policy: manual_only
material:
  name: Bambu PLA Basic
  lane_default: easy
  requires_dryness_tracking: false
plate:
  name: Bambu Dual-Texture PEI Plate
  side_required: explicit
  side: textured
constraints:
  dimensions_mm:
  - shared base target 125 x 70 mm, soft max 130 x 75 mm
  - height under 85 mm
  tolerance_notes: Decorative print; prioritize chunky support-aware facial cues,
    goal backdrop structure, and paint-friendly Brazil jersey panels.
manual_gates:
- export_review
- slicer_review
- print_start
source_files:
- source/model.py
- outputs/world-cup-neighbors.scad
design_files:
- designs/v3/design.yaml
- designs/v3/people.yaml
- designs/v3/print_constraints.yaml
- designs/v3/visual_acceptance.yaml
- designs/v3/build_plan.yaml
