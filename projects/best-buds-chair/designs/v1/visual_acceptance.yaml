schema_version: 2
required_views:
  - front
  - three_quarter
  - rear
  - top_plate
  - face_closeup
  - face_closeup_woman
  - face_closeup_dog
thumbnail_check:
  enabled: true
  size_px: 150
  question: Are the woman and dog identifiable within two seconds at thumbnail size?
human_review_questions:
  - Are the woman and dog identifiable within two seconds?
  - Are glasses, hair silhouette, and dog ears readable in face closeups?
  - Does the chair frame read at thumbnail scale without paint?
  - Does the scene read in single green PLA with no paint?
  - Does any visible feature look too thin for a 0.4 mm nozzle?
acceptance_thresholds:
  people_readability: must_pass_human_review
  single_color_legibility: must_pass_human_review
  freecad_validity: valid_and_closed_single_solid
  blocking_geometry_errors: zero
  stl_mesh: watertight_manifold_required
shapr3d_handoff:
  body_step: outputs/best-buds-chair-v1-body.step
  fused_stl: outputs/best-buds-chair-v1-fused.stl
  note: Fuse Meshy heads to body stubs; export fused STL for release-check.
concept_sheet:
  path: photos/reference/concept-meshy.png
  role: visual acceptance target — compare Blender face closeups before print
