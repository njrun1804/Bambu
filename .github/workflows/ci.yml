name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: shared-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-check:
    uses: njrun1804-cc/engineering-control-plane/.github/workflows/repo-check.yml@08619e3a5a6c0a2462f1eff36cba04f71ab29d9e
    with:
      profile: bambu
