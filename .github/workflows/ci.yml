name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: shared-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-check:
    uses: njrun1804-cc/engineering-control-plane/.github/workflows/repo-check.yml@6b9c098e0324ff83c26d97bb8738d9ebce25cd95
    with:
      profile: bambu
