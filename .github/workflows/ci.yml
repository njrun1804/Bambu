name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: shared-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-check:
    uses: njrun1804-cc/engineering-control-plane/.github/workflows/repo-check.yml@3df7e16be3a21b55348b8faa866c9bce7828d88c
    with:
      profile: bambu
