name: CodeQL advisory

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    permissions:
      contents: read
      security-events: write
    uses: njrun1804-cc/engineering-control-plane/.github/workflows/codeql.yml@9484d1c6f25db3cf865a07f7775bf597d8940271
    with:
      languages: python
