name: CodeQL advisory

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    permissions:
      contents: read
      security-events: write
    uses: njrun1804-cc/engineering-control-plane/.github/workflows/codeql.yml@e9437849e0c6ebd65ca33929f42728ee7c8e4f87
    with:
      languages: python
